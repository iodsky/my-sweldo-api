spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: mysweldo-api
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  batch:
    job:
      enabled: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

batch:
  upload:
    directory: uploads

server:
  port: ${PORT}
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /docs
  swagger-ui:
    path: /swagger-ui.html
  show-actuator: false

security:
  jwt:
    secret-key: ${JWT_SECRET_KEY}
    access-token:
      expiration-time: ${JWT_ACCESS_EXPIRATION}
    refresh-token:
      expiration-time: ${JWT_REFRESH_EXPIRATION}
    cookie:
      secure: ${JWT_COOKIE_SECURE:false}
      http-only: ${JWT_COOKIE_HTTP_ONLY:true}
      same-site: ${JWT_COOKIE_SAME_SITE:Lax}

