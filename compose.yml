services:
  spring:
    container_name: mysweldo-server
    image: ghcr.io/iodsky/mysweldo-api:latest
    restart: always
    ports:
      - 8001:8001
    env_file:
      - .env
    labels:
      - "traefik.http.routers.mysweldo-api.rule=Host(`mysweldo.iodsky.com`)"
      - "traefik.http.routers.mysweldo-api.entrypoints=websecure"
      - "traefik.http.routers.mysweldo-api.tls.certresolver=myresolver"
      - "traefik.http.services.mysweldo-api.loadbalancer.server.port=8001"
    networks:
      - mysweldo-network
      - traefik

  watchtower:
    image: containrrr/watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: 1800
      WATCHTOWER_INCLUDE_RESTARTING: "true"
    command: --cleanup spring
    networks:
      - mysweldo-network

volumes:
  mysweldo-postgres-data:

networks:
  mysweldo-network:
  traefik:
    external: true